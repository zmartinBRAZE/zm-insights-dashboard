<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights Discovery Profile - Zach Martin</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased selection:bg-indigo-500/30">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Icon Component (Replacing lucide-react imports for single-file reliability) ---
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        BrainCircuit: <><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 10h5"/><path d="M12 14h5"/><path d="M12 18h5"/><circle cx="19" cy="10" r="2"/><circle cx="19" cy="14" r="2"/><circle cx="19" cy="18" r="2"/></>,
        Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
        ShieldAlert: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></>,
        Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
        Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
        Award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
        ChevronRight: <polyline points="9 18 15 12 9 6"/>
      };
      
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // --- Data Extracted from Insights Profile ---
    const profileData = {
      name: "Zach Martin",
      role: "AI Solutions Consultant",
      company: "Braze",
      type: "26: Motivating Inspirer (Classic)",
      overview: "Zach enthusiastically and co-operatively joins in activities. He radiates goodwill and enthusiasm, is optimistic about life, and displays fierce loyalty to those around him. Highly perceptive, he thrives in stimulating environments and is driven by possibilities beyond the obvious.",
      colorDynamics: [
        { color: 'Blue', conscious: 19, unconscious: 12, hex: 'bg-blue-600', fill: '#2563eb', description: 'Analytical, cautious, precise, and objective. Shows a strong desire to get things right factually.' },
        { color: 'Green', conscious: 33, unconscious: 31, hex: 'bg-green-500', fill: '#22c55e', description: 'Accommodating, deep reflective thought. Values privacy and prefers to avoid confrontation.' },
        { color: 'Yellow', conscious: 88, unconscious: 81, hex: 'bg-yellow-400', fill: '#facc15', description: 'Sociable, dynamic, demonstrative, and enthusiastic. Excels at networking and generating ideas.' },
        { color: 'Red', conscious: 69, unconscious: 67, hex: 'bg-red-600', fill: '#dc2626', description: 'Driven, demanding, determined. Once committed, has enormous resolve to carry projects through.' }
      ],
      strengths: [
        { title: "Builds Relationships", tip: "Builds relationships quickly and effectively." },
        { title: "Inspirational Approach", tip: "Interactive and inspirational approach; generates high aspirations." },
        { title: "Perceptive & Empathetic", tip: "Highly perceptive and empathetic with others." },
        { title: "Humor & Fun", tip: "Maintains a strong sense of humour and fun." },
        { title: "Articulate Communicator", tip: "Articulate and active in communication." }
      ],
      weaknesses: [
        { title: "Inadequate Preparation", tip: "May prepare inadequately or poorly." },
        { title: "Unrealistic Deadlines", tip: "Will set unrealistic deadlines for himself and others." },
        { title: "Easily Influenced", tip: "Easily influenced by recent events or conversations." },
        { title: "Lacking Persistence", tip: "Somewhat lacking in persistence once a job becomes routine." }
      ],
      teamValue: [
        { title: "People Orientation", tip: "Displays a strong people-orientation and makes friends easily." },
        { title: "Generates Ideas", tip: "Generates a prolific number of ideas and possibilities." },
        { title: "Provides Inspiration", tip: "Provides inspiration, enthusiasm, and high drive." }
      ],
      communication: {
        dos: [
          { rule: "Be Spontaneous", tip: "Be spontaneous and harmonious." },
          { rule: "Use a Fun Approach", tip: "Use an easy-going and fun approach." },
          { rule: "Offer Praise", tip: "Offer praise and appreciation when due." }
        ],
        donts: [
          { rule: "Challenge Unnecessarily", tip: "Unnecessarily challenge ideas or actions." },
          { rule: "Stick Rigidly to Business", tip: "Stick rigidly to business issues without personal interaction." },
          { rule: "Dampen Energy", tip: "Dampen his enthusiastic energy with negative inputs." }
        ]
      }
    };

    // --- Components ---

    const TooltipItem = ({ title, tip, icon }) => (
      <div className="relative group flex items-start space-x-3 p-3 rounded-lg hover:bg-slate-800/50 transition-colors cursor-help border border-transparent hover:border-slate-700">
        <div className="mt-0.5 text-indigo-400 flex-shrink-0">
          <Icon name={icon} size={18} />
        </div>
        <span className="text-slate-200 font-medium leading-tight">{title}</span>
        
        {/* Tooltip Content */}
        <div className="absolute z-10 w-64 p-3 text-sm text-slate-100 bg-slate-900 border border-indigo-500/30 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 bottom-full left-1/2 transform -translate-x-1/2 mb-2 pointer-events-none">
          <div className="absolute w-3 h-3 bg-slate-900 border-b border-r border-indigo-500/30 transform rotate-45 -bottom-1.5 left-1/2 -translate-x-1/2"></div>
          {tip}
        </div>
      </div>
    );

    const SectionCard = ({ title, icon, headerRight, children, className = "" }) => (
      <div className={`bg-slate-800/40 border border-slate-700/50 rounded-2xl p-6 backdrop-blur-sm ${className}`}>
        <div className="flex items-center justify-between border-b border-slate-700/50 pb-4 mb-6">
          <div className="flex items-center space-x-3">
            <div className="p-2 bg-indigo-500/10 rounded-lg">
              <Icon name={icon} className="text-indigo-400" size={24} />
            </div>
            <h2 className="text-xl font-semibold text-white">{title}</h2>
          </div>
          {headerRight && <div>{headerRight}</div>}
        </div>
        {children}
      </div>
    );

    // --- Radar Chart Component ---
    const RadarChart = ({ data, viewMode }) => {
      // Angle mappings match Insights Discovery wheel quadrants
      const angles = { 'Blue': 315, 'Red': 45, 'Yellow': 135, 'Green': 225 };
      
      // Re-order data so the polygon connects in a clean, non-intersecting circle
      const radarOrder = ['Blue', 'Red', 'Yellow', 'Green'];
      const orderedData = radarOrder.map(c => data.find(d => d.color === c));
      
      const getPoint = (val, colorName) => {
        const r = (val / 100) * 100; // max radius 100 on a 300x300 canvas
        const rad = (angles[colorName] - 90) * (Math.PI / 180); // -90 aligns 0 deg to Top
        return `${150 + r * Math.cos(rad)},${150 + r * Math.sin(rad)}`;
      };

      const otherViewMode = viewMode === 'conscious' ? 'unconscious' : 'conscious';
      const activePoints = orderedData.map(d => getPoint(d[viewMode], d.color)).join(' ');
      const otherPoints = orderedData.map(d => getPoint(d[otherViewMode], d.color)).join(' ');

      return (
        <svg viewBox="0 0 300 300" className="w-full h-full max-h-72 drop-shadow-xl overflow-visible">
          {/* Grid rings */}
          {[25, 50, 75, 100].map(val => (
            <polygon 
              key={val} 
              points={orderedData.map(d => getPoint(val, d.color)).join(' ')} 
              fill="none" 
              stroke="#334155" 
              strokeWidth="1" 
              strokeDasharray="4 4" 
            />
          ))}
          
          {/* Axes */}
          {orderedData.map(d => {
            const [x, y] = getPoint(100, d.color).split(',');
            return <line key={`axis-${d.color}`} x1="150" y1="150" x2={x} y2={y} stroke="#334155" strokeWidth="1" />;
          })}

          {/* Inactive Outline (for comparison context) */}
          <polygon 
            points={otherPoints} 
            fill="none" 
            stroke="#475569" 
            strokeWidth="1.5" 
            strokeDasharray="4 4" 
            className="transition-all duration-700 ease-in-out" 
          />

          {/* Active Polygon */}
          <polygon 
            points={activePoints} 
            fill="rgba(99, 102, 241, 0.2)" 
            stroke="#818cf8" 
            strokeWidth="2.5" 
            className="transition-all duration-700 ease-in-out" 
          />

          {/* Points */}
          {orderedData.map(d => {
            const [cx, cy] = getPoint(d[viewMode], d.color).split(',');
            return (
              <circle 
                key={`pt-${d.color}`} 
                cx={cx} 
                cy={cy} 
                r="5" 
                fill={d.fill} 
                className="transition-all duration-700 ease-in-out" 
              />
            );
          })}

          {/* Outer Labels */}
          {orderedData.map(d => {
            const [x, y] = getPoint(120, d.color).split(',');
            return (
              <text 
                key={`lbl-${d.color}`} 
                x={x} 
                y={y} 
                fill="#94a3b8" 
                fontSize="13" 
                textAnchor="middle" 
                dominantBaseline="middle" 
                fontWeight="600"
                className="uppercase tracking-widest"
              >
                {d.color}
              </text>
            );
          })}
        </svg>
      );
    };

    // --- Main Application ---
    function App() {
      const [viewMode, setViewMode] = useState('conscious'); // 'conscious' | 'unconscious'

      return (
        <div className="min-h-screen">
          
          {/* Header */}
          <header className="relative overflow-hidden bg-slate-900 border-b border-slate-800 pt-20 pb-16 px-6 sm:px-12">
            <div className="absolute inset-0 bg-gradient-to-br from-indigo-900/20 via-slate-900 to-slate-900 pointer-events-none"></div>
            <div className="max-w-6xl mx-auto relative z-10">
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                  <div className="inline-flex items-center space-x-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 text-sm font-medium mb-4">
                    <Icon name="BrainCircuit" size={16} />
                    <span>Insights® Discovery Profile</span>
                  </div>
                  <h1 className="text-4xl md:text-6xl font-bold text-white tracking-tight mb-2">
                    {profileData.name}
                  </h1>
                  <p className="text-xl md:text-2xl text-slate-400 font-light">
                    {profileData.role} <span className="text-indigo-400 font-medium">@ {profileData.company}</span>
                  </p>
                </div>
                <div className="text-left md:text-right">
                  <p className="text-sm text-slate-500 uppercase tracking-wider font-semibold mb-1">Wheel Position</p>
                  <p className="text-lg text-slate-200 border-l-4 md:border-l-0 md:border-r-4 border-indigo-500 pl-3 md:pl-0 md:pr-3 py-1">
                    {profileData.type}
                  </p>
                </div>
              </div>
            </div>
          </header>

          {/* Main Dashboard */}
          <main className="max-w-6xl mx-auto px-6 sm:px-12 py-12 space-y-8">
            
            <p className="text-lg text-slate-300 leading-relaxed max-w-4xl">
              {profileData.overview} <em>Hover over the items below to reveal deeper psychological insights.</em>
            </p>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              {/* Left Column: Strengths & Weaknesses */}
              <div className="lg:col-span-1 space-y-8">
                <SectionCard title="Key Strengths" icon="Award">
                  <div className="space-y-1">
                    {profileData.strengths.map((item, idx) => (
                      <TooltipItem key={idx} title={item.title} tip={item.tip} icon="ChevronRight" />
                    ))}
                  </div>
                </SectionCard>

                <SectionCard title="Possible Blind Spots" icon="ShieldAlert">
                  <div className="space-y-1">
                    {profileData.weaknesses.map((item, idx) => (
                      <TooltipItem key={idx} title={item.title} tip={item.tip} icon="ChevronRight" />
                    ))}
                  </div>
                </SectionCard>
              </div>

              {/* Middle & Right Column: Color Dynamics & Comms */}
              <div className="lg:col-span-2 space-y-8">
                
                {/* Color Dynamics & Preference Flow */}
                <SectionCard 
                  title="Color Dynamics & Preference Flow" 
                  icon="Activity"
                  headerRight={
                    <div className="flex space-x-1 bg-slate-900/80 p-1 rounded-lg border border-slate-700">
                      <button 
                        onClick={() => setViewMode('conscious')} 
                        className={`px-3 py-1.5 rounded-md text-xs sm:text-sm font-medium transition-all ${viewMode === 'conscious' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                      >
                        Conscious
                      </button>
                      <button 
                        onClick={() => setViewMode('unconscious')} 
                        className={`px-3 py-1.5 rounded-md text-xs sm:text-sm font-medium transition-all ${viewMode === 'unconscious' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                      >
                        Less Conscious
                      </button>
                    </div>
                  }
                >
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-8 items-center pt-6 pb-2">
                    
                    {/* Bar Graph */}
                    <div className="flex justify-between items-end h-64 gap-3 sm:gap-6 w-full">
                      {profileData.colorDynamics.map((color, idx) => (
                        <div key={idx} className="relative group w-full flex flex-col justify-end h-full">
                          <div className="absolute -top-10 w-full text-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span className="text-xs font-semibold bg-slate-800 px-2 py-1 rounded text-slate-200 shadow-lg">
                              {color[viewMode]}%
                            </span>
                          </div>
                          <div 
                            className={`w-full rounded-t-lg ${color.hex} shadow-[0_0_15px_rgba(0,0,0,0.2)] transition-all duration-700 ease-in-out group-hover:brightness-110 cursor-help relative`}
                            style={{ height: `${color[viewMode]}%` }}
                          >
                            {/* Tooltip for Colors */}
                            <div className="absolute z-20 w-48 p-3 text-xs text-slate-100 bg-slate-900 border border-slate-700 rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 bottom-full left-1/2 transform -translate-x-1/2 mb-2 pointer-events-none">
                              <span className="font-bold mb-1 block">{color.color} Energy</span>
                              {color.description}
                            </div>
                          </div>
                          <div className="text-center mt-3 text-xs sm:text-sm font-medium text-slate-400 uppercase tracking-wider">
                            {color.color}
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Radar Graph */}
                    <div className="h-64 flex justify-center items-center w-full">
                      <RadarChart data={profileData.colorDynamics} viewMode={viewMode} />
                    </div>

                  </div>
                </SectionCard>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  {/* Communication Strategies */}
                  <SectionCard title="Interaction Matrix" icon="MessageSquare" className="md:col-span-2">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div>
                        <h3 className="text-emerald-400 font-semibold mb-4 flex items-center"><Icon name="Zap" size={16} className="mr-2"/> Effective Strategies</h3>
                        <div className="space-y-1">
                          {profileData.communication.dos.map((item, idx) => (
                            <TooltipItem key={idx} title={item.rule} tip={item.tip} icon="ChevronRight" />
                          ))}
                        </div>
                      </div>
                      <div>
                        <h3 className="text-rose-400 font-semibold mb-4 flex items-center"><Icon name="ShieldAlert" size={16} className="mr-2"/> Barriers to Avoid</h3>
                        <div className="space-y-1">
                          {profileData.communication.donts.map((item, idx) => (
                            <TooltipItem key={idx} title={item.rule} tip={item.tip} icon="ChevronRight" />
                          ))}
                        </div>
                      </div>
                    </div>
                  </SectionCard>
                </div>
              </div>
            </div>

            {/* Value to Team - Full Width */}
            <SectionCard title="Value to the Team" icon="Users">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {profileData.teamValue.map((item, idx) => (
                  <TooltipItem key={idx} title={item.title} tip={item.tip} icon="Target" />
                ))}
              </div>
            </SectionCard>

            {/* AI Solutions Consultant Braze Synthesis */}
            <div className="mt-16 bg-gradient-to-br from-indigo-950 to-slate-900 border border-indigo-500/20 rounded-3xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
              {/* Decorative background element */}
              <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-indigo-500/10 blur-3xl rounded-full pointer-events-none"></div>
              
              <div className="relative z-10">
                <div className="flex items-center space-x-4 mb-8">
                  <div className="p-3 bg-indigo-500/20 rounded-xl">
                    <Icon name="Target" className="text-indigo-400" size={32} />
                  </div>
                  <div>
                    <h2 className="text-2xl md:text-3xl font-bold text-white">Impact Synthesis at Braze</h2>
                    <p className="text-indigo-300 font-medium">Applying the Motivating Inspirer to AI Solutions Consulting</p>
                  </div>
                </div>

                <div className="space-y-6 text-slate-300 leading-relaxed text-lg">
                  <p>
                    As a <strong className="text-white font-semibold">26: Motivating Inspirer</strong>, Zach brings an infectious energy and visionary mindset to the AI Solutions Consulting team at Braze. In a landscape where artificial intelligence meets complex marketing automation, Zach excels not just by understanding the technology, but by enthusiastically selling the <em>vision</em> of what that technology can achieve. His dominant <span className="text-yellow-400 font-semibold">Yellow</span> (sociable/dynamic) combined with high <span className="text-red-400 font-semibold">Red</span> (driven/resolute) energies make him a dynamic communicator who can quickly build rapport, inspire his team, and aggressively drive projects toward an exciting future state.
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 py-4">
                    <div className="bg-slate-900/50 rounded-xl p-6 border border-slate-700/50">
                      <h4 className="text-indigo-400 font-semibold text-xl mb-3">Evangelizing AI Solutions</h4>
                      <p className="text-sm">
                        Zach views the world as an endlessly expanding realm of possibilities. When translating Braze's AI capabilities (like Predictive Churn or AI Copywriting) to client use-cases, he won't just list technical specs. He will vividly paint a picture of the bright future those tools enable. His charisma and "out-loud" thinking ensure that clients don't just understand the solution—they get excited about it.
                      </p>
                    </div>

                    <div className="bg-slate-900/50 rounded-xl p-6 border border-slate-700/50">
                      <h4 className="text-indigo-400 font-semibold text-xl mb-3">Client & Team Dynamics</h4>
                      <p className="text-sm">
                        As a "socially adept, even-tempered" influence, Zach acts as the relational glue during high-stakes client engagements. He relies heavily on participation and democratic processes. While he isn't naturally drawn to highly technical, isolated data work (low Blue energy), his value in client meetings is in being the charismatic voice of the project. He easily navigates interpersonal roadblocks and builds fierce loyalty among his team.
                      </p>
                    </div>
                  </div>

                  <div className="pt-4 border-t border-slate-700/50">
                    <h3 className="text-white font-semibold text-xl mb-4">Consulting Synergy & Growth at Braze</h3>
                    <ul className="space-y-4">
                      <li className="flex items-start">
                        <span className="text-indigo-400 mr-3 mt-1">✦</span>
                        <div>
                          <strong className="text-slate-200">Leverage His Networking:</strong> Put Zach in front of key clients where building enthusiasm and visionary momentum for AI is critical. Let him lead the big-picture kickoff meetings.
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="text-indigo-400 mr-3 mt-1">✦</span>
                        <div>
                          <strong className="text-slate-200">Provide Structural Support:</strong> Because his lowest energy is Blue (analytical rigor), pair Zach with highly detail-oriented team members who can handle the deep technical fact-checking. This frees him to focus on strategy and relationship building without crucial details slipping through the cracks.
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="text-indigo-400 mr-3 mt-1">✦</span>
                        <div>
                          <strong className="text-slate-200">Manage Deadlines & Scope:</strong> Zach's desire to please others and explore every appealing opportunity can lead to overcommitment. Leadership should help him establish realistic deadlines and project boundaries so his enthusiasm doesn't outpace the team's capacity to deliver.
                        </div>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
